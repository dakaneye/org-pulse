name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          set -Eeuo pipefail
          version="${GITHUB_REF_NAME#v}"
          for os in linux darwin; do
            for arch in amd64 arm64; do
              output="dist/org-pulse_${version}_${os}_${arch}"
              mkdir -p "$output"
              GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
                go build -ldflags="-s -w" -o "$output/org-pulse" .
              cp LICENSE README.md "$output/"
              tar -czf "$output.tar.gz" -C dist "org-pulse_${version}_${os}_${arch}"
            done
          done
          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Create release
        uses: dakaneye/hookshot/release-pilot@1b43157bc205516bdb653ebeccdb7ef7079bb19d
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          args: --tag ${{ github.ref_name }}

      - name: Upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/checksums.txt --clobber
