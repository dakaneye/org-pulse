version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: org-pulse
    main: .
    binary: org-pulse
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  github:
    owner: dakaneye
    name: org-pulse
  draft: false
  prerelease: auto
